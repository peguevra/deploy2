<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 10px;
    background: #f5f5f5;
    margin: 0;
}

h3 {
    margin: 5px 0 15px 5px;
}

/* カード */
.card {
    background: white;
    margin: 10px 0;
    padding: 14px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    cursor: pointer;
}

/* タイトル（Category + Name） */
.title {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 0.5px;
}

/* 日付 */
.date {
    font-size: 12px;
    color: gray;
    margin-top: 6px;
}
</style>
</head>

<body>

<h3>名刺一覧</h3>

<div id="list"></div>

<script>
fetch('data.json')
.then(r => r.json())
.then(data => {

    const list = document.getElementById('list');

    // 新しい順に並べる（おすすめ）
    data.sort((a, b) => b.CreatedAt.localeCompare(a.CreatedAt));

    data.forEach(x => {

        const card = document.createElement('div');
        card.className = 'card';

        // ★カードクリックで開く
        card.onclick = () => {
            window.open(x.Url, '_blank');
        };

        card.innerHTML = `
            <div class="title">${x.Category}：${x.Name}</div>
            <div class="date">${x.CreatedAt}</div>
        `;

        list.appendChild(card);
    });

});
</script>

</body>
</html>
