<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

/* ===== ヘッダ固定 ===== */
.header {
    position: sticky;
    top: 0;
    background: white;
    padding: 10px;
    z-index: 100;
    border-bottom: 1px solid #ddd;
}

/* ソート */
.sort-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
}

.sort-btn {
    font-size: 14px;
    cursor: pointer;
    color: #555;
}

.sort-btn.active {
    font-weight: bold;
    color: black;
}

/* フィルタ */
.filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 12px;
    background: #eee;
    cursor: pointer;
}

.filter-btn.active {
    background: #222;
    color: white;
}

/* ===== リスト ===== */
#list {
    padding: 10px;
}

/* カード */
.card {
    background: white;
    margin-bottom: 10px;
    padding: 14px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    cursor: pointer;
}

/* タイトル */
.title {
    font-size: 16px;
    font-weight: bold;
}

/* 日付 */
.date {
    font-size: 12px;
    color: gray;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="header">

    <!-- ソート -->
    <div class="sort-bar">
        <div id="btn-name" class="sort-btn active">Name</div>
        <div id="btn-date" class="sort-btn">Date</div>
        <div id="btn-category" class="sort-btn">Category</div>
    </div>

    <!-- フィルタ -->
    <div id="filterBar" class="filter-bar"></div>

</div>

<div id="list"></div>

<script>
let DATA = [];
let currentSort = "name";
let currentFilter = "ALL";

// ===== データ取得 =====
fetch('data.json')
.then(r => r.json())
.then(data => {

    // ヘッダ除去
    DATA = data.filter(x => x.Name && x.Name !== "Name");

    createFilterButtons();
    render();
});

// ===== Category抽出 → ボタン生成 =====
function createFilterButtons() {

    const bar = document.getElementById("filterBar");

    const categories = [...new Set(DATA.map(x => x.Category))].sort();

    // ALLボタン
    const allBtn = createFilterBtn("ALL");
    bar.appendChild(allBtn);

    categories.forEach(cat => {
        const btn = createFilterBtn(cat);
        bar.appendChild(btn);
    });
}

function createFilterBtn(cat) {
    const btn = document.createElement("div");
    btn.className = "filter-btn" + (cat === "ALL" ? " active" : "");
    btn.textContent = cat;

    btn.onclick = () => {
        currentFilter = cat;
        render();
        updateFilterActive();
    };

    return btn;
}

// ===== 描画 =====
function render() {

    const list = document.getElementById('list');
    list.innerHTML = "";

    let filtered = [...DATA];

    // フィルタ
    if (currentFilter !== "ALL") {
        filtered = filtered.filter(x => x.Category === currentFilter);
    }

    // ソート
    if (currentSort === "name") {
        filtered.sort((a, b) => a.Name.localeCompare(b.Name));
    } else if (currentSort === "date") {
        filtered.sort((a, b) => b.CreatedAt.localeCompare(a.CreatedAt));
    } else if (currentSort === "category") {
        filtered.sort((a, b) => a.Category.localeCompare(b.Category));
    }

    filtered.forEach(x => {

        const card = document.createElement('div');
        card.className = 'card';

        card.onclick = () => {
            window.open(x.Url, '_blank');
        };

        card.innerHTML = `
            <div class="title">${x.Category}：${x.Name}</div>
            <div class="date">${x.CreatedAt}</div>
        `;

        list.appendChild(card);
    });

    updateSortActive();
}

// ===== ソートボタン =====
document.getElementById("btn-name").onclick = () => {
    currentSort = "name";
    render();
};

document.getElementById("btn-date").onclick = () => {
    currentSort = "date";
    render();
};

document.getElementById("btn-category").onclick = () => {
    currentSort = "category";
    render();
};

// ===== UI状態更新 =====
function updateSortActive() {
    document.getElementById("btn-name").classList.toggle("active", currentSort === "name");
    document.getElementById("btn-date").classList.toggle("active", currentSort === "date");
    document.getElementById("btn-category").classList.toggle("active", currentSort === "category");
}

function updateFilterActive() {
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.toggle("active", btn.textContent === currentFilter);
    });
}
</script>

</body>
</html>
