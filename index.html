<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: sans-serif;
    margin: 0;
    background: #f5f5f5;
}

.header {
    position: sticky;
    top: 0;
    background: #f5f5f5;
    padding: 10px;
    z-index: 10;
}

.sort-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
}

.sort-btn {
    flex: 1;
    padding: 8px;
    background: white;
    border-radius: 10px;
    text-align: center;
    font-size: 13px;
    cursor: pointer;
}

.sort-btn.active {
    background: #222;
    color: white;
}

.filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
}

.filter-btn {
    padding: 6px 10px;
    background: white;
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
}

.filter-btn.active {
    background: #444;
    color: white;
}

.container {
    padding: 10px;
}

.search-box {
    width: 100%;
    display: block;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 14px;
    box-sizing: border-box;
}

#list {
    padding: 10px;
}

.card {
    background: white;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 12px;
    display: block;
    text-decoration: none;
    color: inherit;
}

.name {
    font-weight: bold;
    font-size: 15px;

    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;

    overflow: hidden;
    word-break: break-word;
}

.date {
    font-size: 12px;
    color: gray;
    margin-top: 4px;
}
</style>
</head>

<body>

<div class="header">
    <div class="sort-bar">
        <div id="sort-name" class="sort-btn active" onclick="setSort('name')">Name</div>
        <div id="sort-date" class="sort-btn" onclick="setSort('date')">Date</div>
        <div id="sort-category" class="sort-btn" onclick="setSort('category')">Category</div>
    </div>

    <div id="filterBar" class="filter-bar"></div>
</div>

<div class="container">
    <input id="searchBox" class="search-box" placeholder="検索（名前・カテゴリ）">
</div>

<div id="list"></div>

<script>
let originalData = [];
let currentSort = 'name';
let currentFilter = 'ALL';
let searchText = '';

/* 初期読み込み（Supabase） */
fetch('https://ylnykglsckcfgalvefcy.supabase.co/rest/v1/cards?select=*'', {
    headers: {
        apikey: 'sb_publishable_eYNsMIHImr5MhyOpeBW-eg_D42B08FA',
        Authorization: 'Bearer sb_publishable_eYNsMIHImr5MhyOpeBW-eg_D42B08FA'
    }
})
.then(r => r.json())
.then(data => {

    // ★既存JS互換に変換
    originalData = data.map(x => ({
        Name: x.name,
        Category: x.category,
        Url: x.url,
        CreatedAt: x.date
    }));

    buildFilterButtons(originalData);
    render();
});

/* カテゴリボタン生成 */
function buildFilterButtons(data) {
    const bar = document.getElementById('filterBar');

    const categories = [...new Set(data.map(x => x.Category))];

    const allBtn = createFilterButton('ALL');
    bar.appendChild(allBtn);

    categories.forEach(c => {
        const btn = createFilterButton(c);
        bar.appendChild(btn);
    });

    setActiveFilter('ALL');
}

function createFilterButton(name) {
    const btn = document.createElement('div');
    btn.className = 'filter-btn';
    btn.textContent = name;

    btn.onclick = () => {
        currentFilter = name;
        setActiveFilter(name);
        render();
    };

    return btn;
}

function setActiveFilter(name) {
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        if (b.textContent === name) b.classList.add('active');
    });
}

/* ソート */
function setSort(type) {
    currentSort = type;

    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sort-' + type).classList.add('active');

    render();
}

/* 検索 */
document.getElementById('searchBox').addEventListener('input', e => {
    searchText = e.target.value.toLowerCase();
    render();
});

/* 描画 */
function render() {
    let data = [...originalData];

    if (currentFilter !== 'ALL') {
        data = data.filter(x => x.Category === currentFilter);
    }

    if (searchText) {
        data = data.filter(x =>
            (x.Name && x.Name.toLowerCase().includes(searchText)) ||
            (x.Category && x.Category.toLowerCase().includes(searchText))
        );
    }

    data.sort((a, b) => {
        if (currentSort === 'name') return a.Name.localeCompare(b.Name);
        if (currentSort === 'category') return a.Category.localeCompare(b.Category);
        return (b.CreatedAt || '').localeCompare(a.CreatedAt || '');
    });

    const list = document.getElementById('list');
    list.innerHTML = '';

    data.forEach(x => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = x.Url;
        a.target = '_blank';

        a.innerHTML = `
            <div class="name">${x.Category}：${x.Name}</div>
            <div class="date">${x.CreatedAt}</div>
        `;

        list.appendChild(a);
    });
}
</script>

</body>
</html>
